name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && npx @opennextjs/cloudflare build --skipWranglerConfigCheck
        env:
          NODE_ENV: production

      - name: Fix OpenNext output structure
        run: |
          # OpenNext bug: it puts files in cloudflare-templates/ but worker.js imports from cloudflare/
          # This fix copies files to the correct locations
          mkdir -p .open-next/cloudflare
          cp .open-next/cloudflare-templates/images.js .open-next/cloudflare/ 2>/dev/null || true
          cp .open-next/cloudflare-templates/init.js .open-next/cloudflare/ 2>/dev/null || true
          cp .open-next/cloudflare-templates/skew-protection.js .open-next/cloudflare/ 2>/dev/null || true
          # Ensure _worker.js exists (entry point for Cloudflare Pages)
          cp .open-next/worker.js .open-next/_worker.js 2>/dev/null || true
          echo "Fixed OpenNext output structure"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy .open-next --project-name=uae-ndip --commit-message="Deploy from GitHub Actions"
